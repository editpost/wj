<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>واجبات باچر ✨</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#2563eb">
    <link rel="apple-touch-icon" href="logo.png">
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;900&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg-body: #f1f5f9;
            --bg-card: #ffffff;
            --text-main: #1e293b;
            --text-sub: #64748b;
            --primary: #2563eb;
            --border: #e2e8f0;
            --input-bg: #f8fafc;
        }

        .dark-mode {
            --bg-body: #0f172a;
            --bg-card: #1e293b;
            --text-main: #f1f5f9;
            --text-sub: #94a3b8;
            --primary: #3b82f6;
            --border: #334155;
            --input-bg: #0f172a;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; transition: background 0.3s, color 0.3s; }
        body { font-family: 'Tajawal', sans-serif; background: var(--bg-body); color: var(--text-main); min-height: 100vh; overflow-x: hidden; }

        /* شاشة الترحيب */
        #welcome-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: var(--bg-card); display: flex; flex-direction: column;
            align-items: center; justify-content: center; z-index: 3000;
        }
        .welcome-logo { width: 120px; height: 120px; border-radius: 24px; margin-bottom: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        
        /* الهيدر الثابت */
        header {
            position: fixed; top: 0; left: 0; width: 100%; height: 60px;
            background: var(--bg-card); border-bottom: 1px solid var(--border);
            display: flex; align-items: center; justify-content: space-between;
            padding: 0 15px; z-index: 1000;
        }
        .header-brand { display: flex; align-items: center; gap: 10px; }
        .header-brand img { width: 35px; height: 35px; border-radius: 8px; }
        .header-brand span { font-weight: 900; font-size: 18px; color: var(--primary); }

        /* زر الهمبركر والقائمة */
        .menu-btn { font-size: 24px; cursor: pointer; color: var(--text-main); background: none; border: none; }
        #side-menu {
            position: fixed; top: 0; left: -280px; width: 280px; height: 100%;
            background: var(--bg-card); box-shadow: 5px 0 15px rgba(0,0,0,0.1);
            z-index: 2000; transition: 0.4s; padding: 20px;
        }
        #side-menu.active { left: 0; }
        .overlay { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(0,0,0,0.5); display: none; z-index: 1500; 
        }

        /* التبويبات والمحتوى */
        .tabs { 
            position: sticky; top: 60px; background: var(--bg-body); 
            display: flex; gap: 5px; padding: 10px; overflow-x: auto; z-index: 900;
        }
        .tab { 
            padding: 8px 15px; border-radius: 20px; border: 1px solid var(--border);
            background: var(--bg-card); color: var(--text-sub); font-size: 12px; 
            white-space: nowrap; cursor: pointer; font-family: 'Tajawal';
        }
        .tab.on { background: var(--primary); color: #fff; border-color: var(--primary); }

        .main-container { padding: 80px 15px 100px; max-width: 600px; margin: 0 auto; width: 100%; }
        .panel { display: none; animation: fadeIn 0.4s ease; }
        .panel.on { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .card { background: var(--bg-card); border: 1px solid var(--border); border-radius: 20px; padding: 20px; margin-bottom: 15px; }
        label { display: block; font-size: 13px; font-weight: 700; margin-bottom: 8px; color: var(--text-sub); }
        input, select, textarea { 
            width: 100%; padding: 12px; background: var(--input-bg); border: 1px solid var(--border); 
            border-radius: 12px; color: var(--text-main); font-family: 'Tajawal'; outline: none;
        }

        /* الأزرار */
        .btn-main { 
            width: 100%; padding: 15px; border-radius: 15px; border: none;
            background: var(--primary); color: #fff; font-weight: 800; 
            cursor: pointer; box-shadow: 0 4px 12px rgba(37,99,235,0.2);
        }
        .copy-btn { background: #10b981; margin-top: 15px; }

        /* الفوتر (يظهر فقط في النتيجة) */
        footer { 
            text-align: center; padding: 20px; color: var(--text-sub); 
            font-size: 14px; font-weight: 700; margin-top: 10px;
        }

        /* تنسيق النتيجة */
        .res-box { 
            background: var(--input-bg); padding: 15px; border-radius: 12px; 
            border: 1px solid var(--border); white-space: pre-wrap; font-size: 14px; line-height: 1.8;
        }
    </style>
</head>
<body>

<div id="welcome-screen">
    <img src="logo.png" class="welcome-logo">
    <h1 style="font-weight: 900; margin-bottom: 5px;">واجبات باچر</h1>
    <p style="color: var(--text-sub); margin-bottom: 30px;">نظام إدارة المنشورات المدرسية</p>
    <button class="btn-main" style="width: 200px;" onclick="closeWelcome()">ابدأ الآن</button>
</div>

<header>
    <button class="menu-btn" onclick="toggleMenu()">☰</button>
    <div class="header-brand">
        <span>واجبات باچر</span>
        <img src="logo.png">
    </div>
</header>

<div class="overlay" id="overlay" onclick="toggleMenu()"></div>
<div id="side-menu">
    <h3 style="margin-bottom: 20px; border-bottom: 1px solid var(--border); padding-bottom: 10px;">الإعدادات</h3>
    <div style="display: flex; align-items: center; justify-content: space-between;">
        <span>المظهر الداكن</span>
        <button onclick="toggleTheme()" id="theme-btn" class="tab">تفعيل</button>
    </div>
    <p style="font-size: 11px; color: var(--text-sub); margin-top: 30px;">الإصدار 2.0.1</p>
</div>

<div class="main-container">
    <div class="tabs" id="tabs"></div>

    <div class="panel on" id="p0">
        <div class="card">
            <label>اليوم</label>
            <select id="day"><option>الأحد</option><option>الاثنين</option><option>الثلاثاء</option><option>الأربعاء</option><option>الخميس</option><option>الجمعة</option><option>السبت</option></select>
            <div style="display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; margin-top: 15px;">
                <div><label>اليوم (م)</label><input id="gd" value="10"></div>
                <div><label>الشهر</label>
                    <select id="gm">
                        <option value="1">يناير</option><option value="2">فبراير</option><option value="3">مارس</option><option value="4" selected>أبريل</option>
                    </select>
                </div>
                <div><label>السنة</label><input id="gy" value="2026"></div>
            </div>
            <div style="display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; margin-top: 15px;">
                <div><label>اليوم (هـ)</label><input id="hd" value="22"></div>
                <div><label>الشهر (هـ)</label><input id="hm" value="شوال"></div>
                <div><label>السنة (هـ)</label><input id="hy" value="1447"></div>
            </div>
        </div>
        <button class="btn-main" onclick="go(1)">التالي: الجدول 📚</button>
    </div>

    <div class="panel" id="p1">
        <div class="card" id="les-container"></div>
        <button class="btn-main" onclick="go(2)">التالي: الواجبات 📝</button>
    </div>

    <div class="panel" id="p2">
        <div class="card" id="hw-container"></div>
        <button class="tab" style="width:100%; margin-bottom:10px" onclick="addInput('hw')">+ إضافة واجب جديد</button>
        <button class="btn-main" onclick="go(3)">التالي: الامتحانات 📋</button>
    </div>

    <div class="panel" id="p3">
        <div class="card" id="ex-container"></div>
        <button class="tab" style="width:100%; margin-bottom:10px" onclick="addInput('ex')">+ إضافة امتحان جديد</button>
        <button class="btn-main" onclick="go(4)">التالي: الناشر ✍️</button>
    </div>

    <div class="panel" id="p4">
        <div class="card">
            <label>اسم المشرف</label><input id="author" value="رضا محمد">
            <label style="margin-top:15px">يوزر التواصل</label><input id="contact" value="@Reda_Moh">
        </div>
        <button class="btn-main" onclick="go(5)">إنشاء المنشور النهائي ✨</button>
    </div>

    <div class="panel" id="p5">
        <div class="card">
            <div class="res-box" id="result-text"></div>
            <button class="btn-main copy-btn" id="copyBtn" onclick="copyResult()">📋 نسخ النص بالكامل</button>
        </div>
        <footer>برمجة وتطوير : رضا محمد</footer>
    </div>
</div>

<script>
    // --- الإعدادات العامة ---
    const TABS = ["التاريخ", "الجدول", "الواجبات", "الامتحانات", "الناشر", "النتيجة"];
    const LN = ["الأول", "الثاني", "الثالث", "الرابع", "الخامس", "السادس"];
    let currentPanel = 0;

    // --- واجهة الترحيب والثيم ---
    function closeWelcome() {
        document.getElementById('welcome-screen').style.display = 'none';
    }

    function toggleMenu() {
        document.getElementById('side-menu').classList.toggle('active');
        document.getElementById('overlay').style.display = 
            document.getElementById('side-menu').classList.contains('active') ? 'block' : 'none';
    }

    function toggleTheme() {
        document.body.classList.toggle('dark-mode');
        const isDark = document.body.classList.contains('dark-mode');
        document.getElementById('theme-btn').textContent = isDark ? "إلغاء التفعيل" : "تفعيل";
        localStorage.setItem('theme', isDark ? 'dark' : 'light');
    }

    if (localStorage.getItem('theme') === 'dark') toggleTheme();

    // --- التنقل ---
    const tabsContainer = document.getElementById('tabs');
    TABS.forEach((t, i) => {
        const btn = document.createElement('button');
        btn.className = 'tab' + (i === 0 ? ' on' : '');
        btn.id = 't' + i; btn.textContent = t;
        btn.onclick = () => go(i);
        tabsContainer.appendChild(btn);
    });

    function go(n) {
        document.querySelectorAll('.panel').forEach(p => p.classList.remove('on'));
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('on'));
        document.getElementById('p' + n).classList.add('on');
        document.getElementById('t' + n).classList.add('on');
        currentPanel = n;
        if (n === 5) buildResult();
        window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    // --- توليد الحقول ---
    const lesCont = document.getElementById('les-container');
    for (let i = 0; i < 6; i++) {
        lesCont.innerHTML += `<div style="margin-bottom:10px"><label>الدرس ${LN[i]}</label><input id="l${i}" placeholder="المادة..."></div>`;
    }

    function addInput(type) {
        const cont = document.getElementById(type + '-container');
        const id = Date.now();
        cont.innerHTML += `<div id="${id}" style="margin-bottom:15px; border-bottom:1px solid var(--border); padding-bottom:10px">
            <input placeholder="المادة" id="s${id}" style="margin-bottom:5px">
            <textarea placeholder="التفاصيل..." id="d${id}"></textarea>
            <button onclick="document.getElementById('${id}').remove()" style="color:red; background:none; border:none; font-size:11px; cursor:pointer">حذف ×</button>
        </div>`;
    }

    // --- زر النسخ ---
    function copyResult() {
        const text = document.getElementById('result-text').innerText;
        const btn = document.getElementById('copyBtn');
        navigator.clipboard.writeText(text).then(() => {
            const original = btn.innerHTML;
            btn.innerHTML = "✅ تم النسخ بنجاح";
            setTimeout(() => btn.innerHTML = original, 2000);
        });
    }

    // --- بناء المنشور ---
    function buildResult() {
        const toAr = s => String(s).replace(/\d/g, d => '٠١٢٣٤٥٦٧٨٩'[d]);
        const day = document.getElementById('day').value;
        const LINE = '••••••••••••••••••••••••••••••••••••••••';
        
        let lessons = "";
        for(let i=0; i<6; i++) {
            const v = document.getElementById('l'+i).value;
            lessons += `✳️ الدرس ${LN[i]} ✳️ : ${v || 'لا يوجد'}\n`;
        }

        let homework = "";
        document.querySelectorAll('#hw-container > div').forEach(div => {
            const s = div.querySelector('input').value;
            const d = div.querySelector('textarea').value;
            if(s) homework += `● ${s}\n${d}\n\n`;
        });

        let exams = "";
        document.querySelectorAll('#ex-container > div').forEach(div => {
            const s = div.querySelector('input').value;
            const d = div.querySelector('textarea').value;
            if(s) exams += `● ${s}\n${d}\n\n`;
        });

        const template = `#واجبات_باچر 
${LINE}
يوم : ${day} 
بـ تاريخ : ${toAr(document.getElementById('gd').value)} / ${document.getElementById('gm').options[document.getElementById('gm').selectedIndex].text} / ${toAr(document.getElementById('gy').value)} ( م )
الموافق : ${toAr(document.getElementById('hd').value)} / ${document.getElementById('hm').value} / ${toAr(document.getElementById('hy').value)} ( هـ )
${LINE}
#جدول_يوم_${day}
${lessons}
${LINE}
#الواجبات
${homework || "لا يوجد واجبات ✨"}
${LINE}
#الامتحانات
${exams || "لا يوجد امتحانات ✨"}
${LINE}
بواسطة : ${document.getElementById('author').value}
للتواصل : ${document.getElementById('contact').value}`;

        document.getElementById('result-text').innerText = template;
    }

    // --- PWA ---
    if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('sw.js');
    }
</script>

</body>
</html>
